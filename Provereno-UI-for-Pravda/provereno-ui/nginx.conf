server {
    listen 80;
    server_name _;
    client_max_body_size 10M;
    location /static/ {
        alias /app/provereno/static/;
        expires 7d;
    }
    location / {
        proxy_pass http://web:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
