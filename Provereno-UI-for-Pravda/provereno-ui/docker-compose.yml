version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: provereno
      POSTGRES_PASSWORD: provereno
      POSTGRES_DB: provereno
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provereno"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: [.env]
    ports: ["8080:8080"]
    volumes: ["./data:/app/data"]
volumes:
  pgdata:
